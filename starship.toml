"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "perso"

format = """
$env_var\
$python\
$directory\
$git_branch\
[î‚° ](fg:prev_bg)
"""

[git_branch]
format = '[[î‚°](fg:prev_bg fg:git bg:git) $symbol$branch ](bg:git fg:#444477)'

[directory]
format = "[[î‚°](fg:prev_bg fg:dir bg:dir) $path](bg:dir)"

[python]
format = "[[î‚°](fg:prev_bg fg:py bg:py)( \\($virtualenv\\) )$symbol$version](bg:py)"

[env_var.MY_QGIS_VERSION]
format = "[[î‚°](fg:prev_bg fg:env_qgis bg:env_qgis) $env_value](bg:env_qgis)"

[palettes.perso]
py = "#069694"
git = "#FCA17D"
dir = "#DA627D"
env_qgis = "#9A348E"
